<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ライトボックスのテスト</title>

    <!-- 1. デザイン用のファイルを読み込む -->
    <link rel="stylesheet" href="//cdnjs.cloudflare.com/ajax/libs/luminous-lightbox/2.3.2/luminous-basic.min.css">
    
    <style>
        /* 文中の写真を見やすくするための簡単なCSS */
        body { font-family: sans-serif; line-height: 1.8; padding: 20px; }
        .article-img {
            width: 200px;      /* 文中のサイズ（お好みで） */
            height: auto;
            border-radius: 8px; /* 角を少し丸くする今風のデザイン */
            cursor: zoom-in;    /* マウスを乗せると虫眼鏡マークになる */
            border: 1px solid #ddd;
        }
    </style>
</head>
<body>

    <h2>記事のタイトル</h2>
    
    <p>
        ここには文章が入ります。例えば、治療院の紹介をしている最中に、
        <!-- 2. aタグで大きい画像を、imgタグで小さい画像を指定 -->
        <a href="IMG1HDR.webp" class="zoom">
            <img src="IMG1HDRs.webp" alt="院内の様子" class="article-img">
        </a>
        このように写真を配置します。この画像をクリックすると、ふわっと大きく表示されるはずです。
    </p>

    <p>
        文章の続きがここに入ります。別の写真も、
        <a href="IMG1HDR.webp" class="zoom">
            <img src="IMG1HDRs.webp" alt="機材の紹介" class="article-img">
        </a>
        同じようにクラス名に「zoom」とつけるだけで、勝手に拡大機能がつきます。
    </p>

    <!-- 3. プログラム本体を読み込む -->
    <script src="//cdnjs.cloudflare.com/ajax/libs/luminous-lightbox/2.3.2/Luminous.min.js"></script>
    
    <script>
        // 4. 「zoom」というクラスがついた画像すべてにライトボックスを適用する
        new LuminousGallery(document.querySelectorAll(".zoom"));
    </script>

</body>
</html>
